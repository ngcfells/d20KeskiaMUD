lore:
  society: >
    Sky dwarves dwell in lofty peaks, cliffside citadels, and floating
    strongholds. Their clans are shaped by thin air, fierce winds, and
    the need for precise engineering in perilous heights.
  appearance: >
    Leaner than other dwarves, sky dwarves have wind‑toughened skin,
    braided hair to resist the gusts, and sharp, perceptive eyes.
  culture: >
    Their culture emphasizes agility, craftsmanship, and mastery of
    high‑altitude engineering. They are famed for skybridges, wind‑harps,
    and cliff‑forges.
  religion: >
    Their deities embody wind, storms, mountains, and ancestral guardians
    of the high places.

