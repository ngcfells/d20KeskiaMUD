lore:
  society: >
    Earth dwarves dwell in deep caverns, mineral‑rich mountains, and
    stone‑rooted strongholds. Their clans are shaped by geomancy, mining,
    and the slow, patient rhythms of the earth. They are renowned for
    stonecraft, mineral lore, and mastery of subterranean engineering.
  appearance: >
    Their skin ranges from granite‑gray to deep brown, often with natural
    mineral flecks. Their hair and beards resemble iron, copper, or
    obsidian strands.
  culture: >
    Earth dwarves value patience, endurance, and craftsmanship. Their
    traditions include stone rites, geomantic rituals, and mineral
    divination.
  religion: >
    Their deities embody stone, mountains, minerals, and the deep earth.

