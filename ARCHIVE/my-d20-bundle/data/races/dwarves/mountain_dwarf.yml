lore:
  society: >
    Mountain dwarves dwell in vast strongholds carved into the hearts of
    mountains. Their clans are known for martial discipline, engineering
    prowess, and mastery of stone and metal.
  appearance: >
    Broad‑shouldered and heavily muscled, mountain dwarves have rugged
    features shaped by high‑altitude living and hard labor.
  culture: >
    Their culture emphasizes honor, craftsmanship, and clan loyalty.
    Mountain dwarves are famed for their fortresses, forges, and
    unbreakable shields.
  religion: >
    They honor gods of the forge, mountains, protection, and ancestral
    memory.

