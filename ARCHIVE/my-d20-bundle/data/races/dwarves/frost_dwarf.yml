lore:
  society: >
    Frost dwarves inhabit frozen mountains, glacial caverns, and tundra
    strongholds. Their clans are shaped by scarcity, harsh winters, and
    the need for cooperation in unforgiving climates.
  appearance: >
    Their skin ranges from pale stone to icy blue-gray, with thick beards
    that often freeze in the cold. Their bodies are compact and heavily
    muscled.
  culture: >
    Frost dwarves value endurance, stoicism, and mastery of ice and stone.
    Their craftsmanship includes frost‑tempered metals and rune‑etched tools.
  religion: >
    Their deities embody winter, endurance, storms, and ancestral memory.

