---
command: loot
body: |
  Loot a corpse to retrieve valuables, equipment, or general items carried by the
  creature before it died.

  Looting reveals the corpse’s internal loot table and drops the items into the
  room. After looting, the corpse is removed.

  Looting is trait‑aware:
    • physiology determines corpse type
    • subtype may add special drops
    • size affects quantity
    • decay state reduces or alters yields

  Usage:
    loot <corpse>

  Examples:
    loot goblin
    loot goblin's corpse
    loot corpse
    loot 2.corpse
    loot corpse of bob

  Looting is for general valuables. For biological materials, use:
    harvest, skin, or butcher.
