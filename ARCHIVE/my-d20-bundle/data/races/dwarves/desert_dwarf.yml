lore:
  society: >
    Desert dwarves dwell in sun‑blasted mountains, canyon strongholds, and
    deep desert caverns. Their clans are shaped by scarcity, heat, and the
    need for careful water stewardship. They are renowned for their
    endurance, discipline, and mastery of desert survival.
  appearance: >
    Their skin ranges from bronze to deep earth‑tones, often cracked or
    weathered by the sun. Their beards are tightly braided to keep out sand.
  culture: >
    Desert dwarves value resilience, resourcefulness, and clan loyalty.
    Their craftsmanship includes heat‑tempered metals, sandstone carving,
    and ingenious water‑harvesting devices.
  religion: >
    Their deities embody sun, stone, endurance, and the spirits of the
    desert winds.

