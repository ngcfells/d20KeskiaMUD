lore:
  society: >
    Oceanic dwarves inhabit volcanic archipelagos, coastal cliffs, and
    sea‑carved caverns. Their clans are shaped by storms, tides, and the
    need for mastery of both stone and sea. They build fortified harbors,
    cliffside citadels, and coral‑reinforced structures.
  appearance: >
    Their skin ranges from deep bronze to storm‑gray, often weathered by
    salt and wind. Their hair and beards are braided tightly to resist
    sea spray and storms.
  culture: >
    Oceanic dwarves value seamanship, craftsmanship, and clan loyalty.
    Their traditions include storm rites, coral carving, and volcanic
    metalwork.
  religion: >
    Their deities embody storms, tides, volcanic fire, and ancestral
    guardians of the sea.

