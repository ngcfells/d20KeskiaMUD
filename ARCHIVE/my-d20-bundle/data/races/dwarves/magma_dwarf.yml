lore:
  society: >
    Magma dwarves dwell in volcanic mountains, lava tubes, and geothermal
    caverns. Their clans are shaped by heat, pressure, and the constant
    threat of eruptions. Their forges are legendary for producing
    heat‑tempered alloys and rune‑etched weapons.
  appearance: >
    Their skin ranges from obsidian-dark to ember-red, often marked with
    natural heat‑scar patterns. Their hair and beards may appear soot‑dark,
    coppery, or streaked with ash.
  culture: >
    Magma dwarves value endurance, craftsmanship, and mastery of fire and
    stone. Their traditions include volcanic rites, metalcraft, and
    geomantic engineering.
  religion: >
    Their deities embody fire, stone, creation, and volcanic renewal.

