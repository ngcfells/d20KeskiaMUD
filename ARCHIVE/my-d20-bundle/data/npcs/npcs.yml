- id: small_fire_elemental
  name: "Small Fire Elemental"
  keywords: ["elemental", "fire", "small"]
  level: 1
  description: >
    A whirling pillar of bright flame about 4 feet tall. Its 'features' are 
    merely darker patches of fire that resemble eyes and a mouth.
  attributes:
    health: 9
    dexterity: 13
    strength: 10
    constitution: 10
    intelligence: 4
    wisdom: 11
    charisma: 11
    armor_class: 15
    speed: 5.0
  behaviors:
    d20_combat:
      attack_bonus: 3
      damage: "1d4"
      damage_type: "fire"
      special_attacks:
        - name: "Burn"
          dc: 11
          effect: "Target catches fire for 1d4 rounds unless they pass a Reflex save."
    elemental_traits:
      immunities: ["fire", "poison", "sleep", "paralysis", "stunning", "critical_hits"]
      vulnerabilities: ["cold"]
  script: "small_fire_elemental"

- id: liang_chou
  name: "Liang Chou"
  keywords: ["liang", "chou", "archivist", "arcanist", "master"]
  level: 30
  gender: "male"
  description: >
    A man of indeterminate age with a silver-threaded queue and eyes like polished obsidian. 
    He wears a simple High Shou robe over Thayan-silk trousers, his presence radiating 
    the clinical weight of a thousand libraries. A faint scent of old parchment and 
    ozone follows his fluid, Taiji-influenced movements.
  attributes:
    health: 450
    stamina: 300
    intelligence: 46
    dexterity: 22
    constitution: 20
    strength: 14
    wisdom: 24
    charisma: 26
    appearance: 22
    will: 28
    reflex: 24
    fortitude: 22
  metadata:
    # --- CLASS BREAKDOWN (d20/3.5) ---
    class_levels:
      wizard: 10          # School: Abjuration (Thayan Training)
      red_wizard: 10      # High Thayan Specialist
      archmage: 5         # High Arcana Mastery
      hierophant_arcane: 5 # Epic Tier Planar Archivist
    
    # --- FEATS & BOONS ---
    feats: [
      "martial_training_jian", "weapon_focus_jian", "skill_focus_knowledge",
      "spell_penetration_greater", "quicken_spell", "silent_spell", 
      "planar_bubble", "netherese_arcanist_tradition", "scribe_scroll",
      "craft_wondrous_item", "epic_spellcasting", "universal_literacy"
    ]
    
    # --- CORE METADATA ---
    alignment: "lawful_evil"
    creatureType: "humanoid"
    race: "human"
    isSpellcaster: true
    spellcastingAbility: "intelligence"
    languages: ["high_shou", "common", "netherese", "draconic", "abyssal", "infernal", "celestial", "elven", "loross", "sigil-cant"]
    dimensional_library: [] # Populated via mirroring/retrieval
    isArchivist: true
    
  script: "liang_chou_logic"

