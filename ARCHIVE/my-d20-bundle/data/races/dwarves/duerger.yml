lore:
  society: >
    Duergar dwell in harsh, oppressive strongholds deep beneath the earth,
    shaped by centuries of enslavement, mutation, and cultural isolation.
    Their society is rigid, militaristic, and deeply suspicious of outsiders.
  appearance: >
    Gray-skinned and grim-faced, duergar have pallid eyes adapted to
    darkness. Their bodies are scarred and hardened by labor and conflict.
  culture: >
    Their culture values discipline, endurance, and mastery of the deep
    earth. Duergar forge weapons of war, maintain strict hierarchies, and
    wield innate or psionic abilities depending on their origin.
  religion: >
    They honor dark gods of tyranny, pain, and deep-earth dominion.

