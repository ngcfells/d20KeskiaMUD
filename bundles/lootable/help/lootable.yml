---
command: lootable
body: |
  The **lootable** system provides a unified, trait‑aware framework for generating
  loot from NPCs, corpses, chests, coffers, urns, and other containers.

  Lootable integrates with:
    • d20-traits (physiology, subtype, size)
    • decay (corpses rot over time)
    • lifecycle (environmental modifiers)
    • loot tables (dynamic item generation)

  Lootable supports two major categories:

  ───────────────────────────────────────────────────────────────────────────────
  CORPSES
  ───────────────────────────────────────────────────────────────────────────────

  When an NPC dies, a **corpse container** is created in the room. The corpse:
    • is a decayable item
    • contains no visible items until looted/harvested/skinned/butchered
    • stores a trait‑aware loot table internally
    • is removed after being successfully harvested or looted
    • supports intuitive targeting:
        loot bob
        loot bob's corpse
        loot corpse
        loot 2.corpse
        loot corpse of bob

  Corpse type is determined by physiology traits:
    • undead → dust
    • construct → scrap
    • ooze → slime
    • elemental → essence
    • plant → fibers
    • dragon → dragon_remains
    • fiend → ichor
    • celestial → radiant_remains
    • humanoid/animal → standard corpse

  Corpse contents are determined by:
    • physiology (organs, bones, hides, essences)
    • subtype (fire glands, frost cores, psionic crystals)
    • size (yield scaling)
    • decay state (fresh vs rotted)
    • lifecycle modifiers (corruption, starvation, environment)

  The following commands interact with corpses:

  ───────────────────────────────────────────────────────────────────────────────
  LOOT
  ───────────────────────────────────────────────────────────────────────────────
  Usage:
    loot <corpse>

  Reveals and drops the general loot stored inside a corpse. This is the
  equivalent of "searching the body" for valuables, equipment, or carried items.

  Examples:
    loot goblin
    loot goblin's corpse
    loot corpse
    loot 2.corpse

  After looting, the corpse is removed.

  ───────────────────────────────────────────────────────────────────────────────
  HARVEST
  ───────────────────────────────────────────────────────────────────────────────
  Usage:
    harvest <corpse>

  Extracts biological materials such as:
    • organs
    • glands
    • blood
    • sinew
    • magical essences
    • alchemical components

  Harvesting yields depend on physiology, subtype, and size.

  After harvesting, the corpse is removed.

  ───────────────────────────────────────────────────────────────────────────────
  SKIN
  ───────────────────────────────────────────────────────────────────────────────
  Usage:
    skin <corpse>

  Removes hides, pelts, scales, or chitin from the corpse. Skinning yields depend
  on:
    • creature type
    • size
    • subtype (e.g., fire-resistant scales, frost pelts)

  After skinning, the corpse is removed.

  ───────────────────────────────────────────────────────────────────────────────
  BUTCHER
  ───────────────────────────────────────────────────────────────────────────────
  Usage:
    butcher <corpse>

  Breaks down the corpse for:
    • meat
    • bones
    • marrow
    • fat
    • sinew

  Butchering yields depend on size and physiology.

  After butchering, the corpse is removed.

  ───────────────────────────────────────────────────────────────────────────────
  CONTAINERS (CHESTS, COFFERS, URNS)
  ───────────────────────────────────────────────────────────────────────────────

  Non‑corpse containers use the same lootable system. When opened, they:
    • generate loot based on their lootable config
    • drop items into the room
    • do NOT decay
    • do NOT require harvesting commands

  Example:
    open ancient chest

  ───────────────────────────────────────────────────────────────────────────────
  TRAIT‑AWARE LOOT RESOLUTION
  ───────────────────────────────────────────────────────────────────────────────

  Loot tables are selected based on:
    • physiology (undead, construct, ooze, elemental, plant, dragon, fiend, celestial)
    • subtype (fire, cold, psionic, etc.)
    • size (tiny → gargantuan)
    • environmental modifiers (room lifecycle)
    • decay state (fresh → rotted)

  This allows extremely granular and lore‑accurate loot generation.

  ───────────────────────────────────────────────────────────────────────────────
  SUMMARY
  ───────────────────────────────────────────────────────────────────────────────

  Lootable provides:
    • corpse creation
    • intuitive corpse targeting
    • trait‑aware loot tables
    • harvesting, skinning, butchering
    • container loot generation
    • decay integration
    • lifecycle integration

  Commands:
    loot <corpse>
    harvest <corpse>
    skin <corpse>
    butcher <corpse>

  This system is designed to be modular, extensible, and fully compatible with
  d20‑traits, decay, and lifecycle.
