  appearance: >
    Stocky and muscular, dwarves have broad frames, thick beards, and
    features shaped by generations of labor and endurance.
  culture: >
    Dwarven culture values tradition, honor, and skilled craftsmanship.
    Their clans maintain ancient lineages and guard their secrets fiercely.
  religion: >
    Dwarves honor gods of the forge, stone, protection, and ancestral memory.

