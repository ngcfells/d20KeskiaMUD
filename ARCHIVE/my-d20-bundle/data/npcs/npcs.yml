- id: animated_plant_large
  name: "Large Animated Plant"
  keywords: ["plant", "animated", "large", "tree"]
  level: 4
  description: >
    A massive collection of timber and vine that has uprooted itself. 
    Its thick branches sweep the air like heavy clubs.
  attributes:
    health: 52
    strength: 14
    dexterity: 10
    constitution: 10
    armor_class: 14 # Natural armor + size penalty
    speed: 3.0
  behaviors:
    d20_combat:
      attack_bonus: 5
      damage: "1d8+3" # Slam attack
      damage_type: "bludgeoning"
      reach: 10 # Can hit targets from further away in your combat engine
    plant_traits:
      immunities: ["mind-affecting", "poison", "sleep", "paralysis", "stunning", "critical_hits"]
      vulnerabilities: ["fire"]
    damage_reduction:
      amount: 5
      type: "hardness" # Represents the toughness of the wood
  script: "animated_plant"

