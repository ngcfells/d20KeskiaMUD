lore:
  society: >
    Deep dwarves dwell in remote caverns far from the surface, forming
    isolated clans hardened by scarcity and subterranean dangers.
  appearance: >
    Their skin is stone‑pale or slate‑gray, with eyes adapted to dim light.
    Their bodies are compact and resilient.
  culture: >
    Deep dwarves value secrecy, endurance, and mastery of stonecraft.
    Their traditions emphasize survival, clan loyalty, and caution.
  religion: >
    Their faith centers on earth spirits, ancestral guardians, and
    subterranean deities of stone and endurance.

