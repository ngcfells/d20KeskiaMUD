---
command: loot-tables
body: |
  Loot tables determine what items are generated when a corpse is looted or a
  container is opened. Lootable integrates with d20-traits to select the correct
  table based on physiology, subtype, and size.

  Physiology-based tables:
    undead_loot
    construct_loot
    ooze_loot
    elemental_loot
    plant_loot
    dragon_loot
    fiend_loot
    celestial_loot

  Subtype-based tables:
    fire_subtype_loot
    cold_subtype_loot
    psionic_subtype_loot

  Size-based scaling:
    tiny → 0.5x
    small → 1x
    medium → 1.5x
    large → 2x
    huge → 3x
    gargantuan → 4x

  Containers (chests, coffers, urns) use their own lootable config and do not
  require corpse logic.

  Loot tables are stored inside the corpse and resolved only when the player
  interacts with it using:
    loot, harvest, skin, or butcher.
