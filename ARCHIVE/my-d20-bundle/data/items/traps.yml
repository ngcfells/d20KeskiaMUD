# traps.yml
# Canonical trap definitions for the TrapManager subsystem.

snare:
  type: snare
  category: wildlife
  difficulty: easy
  detectDC: 8
  disarmDC: 10
  triggerDC: 10
  damage: none
  effect: entangle
  materials:
    - rope
    - stick
  tools:
    - tool_trap_kit
  bait: berries
  targets: [animal, beast]

pit:
  type: pit
  category: wildlife
  difficulty: moderate
  detectDC: 12
  disarmDC: 12
  triggerDC: 12
  damage: fall
  effect: prone
  materials:
    - shovel
  tools:
    - tool_trap_kit
  bait: none
  targets: [animal, humanoid]

tripwire:
