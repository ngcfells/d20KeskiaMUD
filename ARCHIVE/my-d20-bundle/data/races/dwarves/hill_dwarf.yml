lore:
  society: >
    Hill dwarves dwell in rolling highlands, foothills, and stone‑rooted
    settlements carved beneath ancient ridges. Their clans are known for
    hospitality, steady leadership, and long‑standing traditions.
  appearance: >
    Slightly broader and earth‑toned compared to other dwarves, hill dwarves
    often have warm brown or ruddy complexions and thick, braided beards.
  culture: >
    Their culture emphasizes community, craftsmanship, and stewardship of
    ancestral lands. Hill dwarves are famed for stonework, brewing, and
    subterranean agriculture.
  religion: >
    Hill dwarves honor deities of hearth, earth, and tradition, maintaining
    shrines in both surface villages and underground halls.

