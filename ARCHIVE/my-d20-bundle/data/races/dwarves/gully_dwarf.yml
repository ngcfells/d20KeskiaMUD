lore:
  society: >
    Gully dwarves, known as Aghar, are a degenerate offshoot of the dwarven
    race. They live in squalor, scavenging in ruins, slums, and forgotten
    tunnels. Their society is loosely organized, often chaotic, and driven
    by immediate survival rather than long-term planning.
  appearance: >
    Gully dwarves are smaller, thinner, and more hunched than other dwarves.
    Their features are often asymmetrical, their clothing ragged, and their
    posture defensive.
  culture: >
    Their culture is built around survival, scavenging, and avoiding danger.
    They value cunning, luck, and the ability to hide or flee when needed.
  religion: >
    Gully dwarves rarely maintain formal religion, though some revere
    ancestral spirits or local idols of luck and protection.

